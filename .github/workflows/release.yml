name: Release CLI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: npm ci
      - run: npm run release:check
      - run: go test ./cli/internal/...
      - env:
          ASIRI_RELEASE_SIGNING_KEY_PEM: ${{ secrets.ASIRI_RELEASE_SIGNING_KEY_PEM }}
        run: |
          test -n "$ASIRI_RELEASE_SIGNING_KEY_PEM" || { echo "ASIRI_RELEASE_SIGNING_KEY_PEM is required" >&2; exit 1; }
          key_path="$RUNNER_TEMP/asiri-release-signing-key.pem"
          printf '%s\n' "$ASIRI_RELEASE_SIGNING_KEY_PEM" > "$key_path"
          chmod 0600 "$key_path"
          echo "ASIRI_RELEASE_SIGNING_KEY=$key_path" >> "$GITHUB_ENV"
      - run: ASIRI_VERSION="${GITHUB_REF_NAME#v}" npm run package:cli:smoke
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/cli/* --verify-tag --title "$GITHUB_REF_NAME" --notes-file dist/cli/RELEASE_NOTES.md
